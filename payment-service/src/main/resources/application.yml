server:
  port: 8082

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5433/payments_db
    username: orderflow
    password: orderflow123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: paymentEvent:com.orderflow.common.event.PaymentEvent
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.orderflow.*
        spring.json.type.mapping: orderEvent:com.orderflow.common.event.OrderEvent,paymentEvent:com.orderflow.common.event.PaymentEvent,inventoryEvent:com.orderflow.common.event.InventoryEvent
      auto-offset-reset: earliest

logging:
  level:
    com.orderflow: INFO
